    const { useState, useEffect, useRef } = React;

    /* ─── Icon ─────────────────────────────────────────────────────────── */
    const Icon = ({ name, size = 16, className = "" }) => {
      if (!feather.icons[name]) return null;
      return (
        <span className="inline-flex items-center justify-center"
          dangerouslySetInnerHTML={{ __html: feather.icons[name].toSvg({ width: size, height: size, class: className }) }} />
      );
    };

    /* ─── ScrambleText ──────────────────────────────────────────────────── */
    const ScrambleText = ({ text, delay = 0, className = "" }) => {
      const [displayText, setDisplayText] = useState(text);
      const [visible, setVisible] = useState(false);
      const ref = useRef();
      const chars = '!<>-_\\\\/[]{}—=+*^?#________';
      
      useEffect(() => {
        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting) { 
            setTimeout(() => setVisible(true), delay * 1000);
            obs.disconnect(); 
          }
        }, { rootMargin: '0px' });
        if (ref.current) obs.observe(ref.current);
        return () => obs.disconnect();
      }, [delay]);

      useEffect(() => {
        if (!visible) return;
        let frame = 0;
        const totalFrames = 30;
        let animationFrameId;

        const animate = () => {
          if (frame < totalFrames) {
            const scrambled = text.split('').map((char, index) => {
              if (char === ' ') return ' ';
              if (frame / totalFrames > index / text.length) return char;
              return chars[Math.floor(Math.random() * chars.length)];
            }).join('');
            setDisplayText(scrambled);
            frame++;
            animationFrameId = requestAnimationFrame(animate);
          } else {
            setDisplayText(text);
          }
        };
        animate();
        return () => cancelAnimationFrame(animationFrameId);
      }, [visible, text]);

      return <span ref={ref} className={className}>{displayText}</span>;
    };

    /* ─── FadeIn ────────────────────────────────────────────────────────── */
    const FadeIn = ({ children, delay = 0, className = "" }) => {
      const [visible, setVisible] = useState(false);
      const ref = useRef();
      useEffect(() => {
        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting) { setVisible(true); obs.disconnect(); }
        }, { rootMargin: '-40px' });
        if (ref.current) obs.observe(ref.current);
        return () => obs.disconnect();
      }, []);
      return (
        <div ref={ref} className={`reveal ${visible ? 'active' : ''} ${className}`} style={{ transitionDelay: `${delay}s` }}>
          {children}
        </div>
      );
    };

    /* ─── Section ───────────────────────────────────────────────────────── */

    /* ─── HoverGlow ──────────────────────────────────────────────────────── */
    const HoverGlow = () => {
      const [mousePos, setMousePos] = useState({ x: -1000, y: -1000 });
      const [isHovered, setIsHovered] = useState(false);
      const glowRef = useRef(null);

      useEffect(() => {
        const parent = glowRef.current?.parentElement;
        if (!parent) return;

        const handleMouseMove = (e) => {
          const rect = parent.getBoundingClientRect();
          setMousePos({ x: e.clientX - rect.left, y: e.clientY - rect.top });
        };
        const onEnter = () => setIsHovered(true);
        const onLeave = () => setIsHovered(false);

        if (getComputedStyle(parent).position === 'static') {
          parent.style.position = 'relative';
        }
        parent.style.overflow = 'hidden';

        parent.addEventListener('mouseenter', onEnter);
        parent.addEventListener('mouseleave', onLeave);
        parent.addEventListener('mousemove', handleMouseMove);

        return () => {
          parent.removeEventListener('mouseenter', onEnter);
          parent.removeEventListener('mouseleave', onLeave);
          parent.removeEventListener('mousemove', handleMouseMove);
        };
      }, []);

      return (
        <div
          ref={glowRef}
          className="pointer-events-none absolute inset-0 transition-opacity duration-500"
          style={{
            opacity: isHovered ? 1 : 0,
            background: `radial-gradient(600px circle at ${mousePos.x}px ${mousePos.y}px, rgba(201,169,110,0.1), transparent 40%)`,
            zIndex: 0
          }}
        />
      );
    };

                          {doc.action} {doc.href && <Icon name="arrow-up-right" size={10} />}
                        </span>
                      </div>
                      <h3 className="font-serif text-[24px] font-light text-foreground">{doc.name}</h3>
                    </Card>
                  );
                  return (
                    <FadeIn key={i} delay={i * 0.08}>
                      {doc.href ? (
                        <a href={doc.href} target="_blank" rel="noopener noreferrer" className="block h-full">
                          {cardContent}
                        </a>
                      ) : (
                        <div className="block h-full">{cardContent}</div>
                      )}
                    </FadeIn>
                  );
                })}
              </div>
            </Section>

            {/* ── PROJECT HEALTH ────────────────────────────────────────── */}
            <Section title="Project Health">
              <div className="grid grid-cols-2 md:grid-cols-4 gap-5">
                {health.map((item, i) => (
                  <FadeIn key={i} delay={i * 0.1}>
                    <Card className="flex flex-col justify-between h-44 relative overflow-hidden group">
                      <div className="absolute top-0 right-0 p-8 opacity-5 group-hover:opacity-15 transition-opacity duration-700 text-gold pointer-events-none">
                        <Icon name={item.icon} size={64} />
                      </div>
                      <div className="font-sans text-[9px] text-muted uppercase tracking-[0.3em] relative z-10">{item.label}</div>
                      <div className={`font-serif text-[26px] font-light relative z-10 leading-tight
                        ${item.state === 'pending' ? 'text-muted/60' : item.state === 'good' ? 'text-foreground' : 'text-gold'}`}>
                        {item.value}
                      </div>
                      {item.subtext && (
                        <div className="font-sans text-[9px] text-muted/40 uppercase tracking-[0.2em] relative z-10 mt-2">
                          * {item.subtext}
                        </div>
                      )}
                    </Card>
                  </FadeIn>
                ))}
              </div>
            </Section>

            {/* ── FOOTER ────────────────────────────────────────────────── */}
            <FadeIn>
              <div className="border-t border-border pt-16 mt-12 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                <div>
                  <div className="font-serif-sc text-[12px] uppercase tracking-[0.35em] text-foreground mb-2">Lune Studio</div>
                  <div className="font-sans text-[10px] text-muted/50">Coromandel Productions × Website Design & Development</div>
                </div>
                <div className="flex items-center gap-8">
                  <div className="font-sans text-[9px] text-muted uppercase tracking-[0.2em]">Confidential</div>
                  <div className="w-px h-3 bg-border"></div>
                  <div className="font-sans text-[9px] text-muted uppercase tracking-[0.2em]">2026</div>
                </div>
              </div>
            </FadeIn>

          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
